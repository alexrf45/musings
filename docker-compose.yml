services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: musings
      POSTGRES_USER: musings
      POSTGRES_PASSWORD: musings
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U musings"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: development
      DATABASE_URL: postgresql://musings:musings@db:5432/musings
      SECRET_KEY: dev-secret-change-me
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
    ports:
      - "8080:8080"
    volumes:
      # hot-reload source in dev (remove in prod)
      - ./blog:/app/blog:ro

volumes:
  postgres_data:
