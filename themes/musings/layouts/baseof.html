<!doctype html>
<html lang="en" data-bs-theme="dark">
<head>
  <!-- Set theme before paint to avoid flash -->
  <script>(function(){var t=localStorage.getItem('theme')||'dark';document.documentElement.setAttribute('data-bs-theme',t);})();</script>

  {{ partial "head.html" . }}
  {{ block "head-extra" . }}{{ end }}
</head>
<body>

  {{ partial "header.html" . }}

  <main class="container py-5">
    {{ block "main" . }}{{ end }}
  </main>

  {{ partial "footer.html" . }}

  <!-- Alpine.js v3 — reactive UI state (defer required for auto-init) -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
          integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
          crossorigin="anonymous"></script>

  {{ block "foot-extra" . }}{{ end }}
</body>
</html>
