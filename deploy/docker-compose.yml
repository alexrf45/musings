services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /opt/musings/data/postgres:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    image: fonalex45/blog:0.0.1-alpha
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV:        production
      DATABASE_URL:   postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY:     ${SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      API_SECRET_KEY: ${API_SECRET_KEY}
    networks:
      - internal
      - proxy
    labels:
      - "com.centurylinklabs.watchtower.scope=musings-prod"
      - "traefik.enable=true"

      # ── Main router (all traffic) ─────────────────────────────────────────────
      - "traefik.http.routers.app.rule=Host(`${DOMAIN}`)"
      - "traefik.http.routers.app.entrypoints=websecure"
      - "traefik.http.routers.app.tls.certresolver=letsencrypt"
      - "traefik.http.routers.app.service=app"
      - "traefik.http.routers.app.middlewares=security-headers@docker,global-ratelimit@docker"
      - "traefik.http.routers.app.priority=1"

      # ── API router (dedicated rate limit, priority 5) ────────────────────────
      - "traefik.http.routers.app-api.rule=Host(`${DOMAIN}`) && PathPrefix(`/api/`)"
      - "traefik.http.routers.app-api.entrypoints=websecure"
      - "traefik.http.routers.app-api.tls.certresolver=letsencrypt"
      - "traefik.http.routers.app-api.service=app"
      - "traefik.http.routers.app-api.middlewares=security-headers@docker,api-ratelimit@docker"
      - "traefik.http.routers.app-api.priority=5"

      # ── API rate limit: 10 req/min, burst 5, per source IP ───────────────────
      - "traefik.http.middlewares.api-ratelimit.ratelimit.average=10"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.period=60s"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.burst=5"
      - "traefik.http.middlewares.api-ratelimit.ratelimit.sourcecriterion.ipstrategy.depth=1"

      # ── Login router (stricter rate limit, higher priority) ───────────────────
      - "traefik.http.routers.app-login.rule=Host(`${DOMAIN}`) && Path(`/login`)"
      - "traefik.http.routers.app-login.entrypoints=websecure"
      - "traefik.http.routers.app-login.tls.certresolver=letsencrypt"
      - "traefik.http.routers.app-login.service=app"
      - "traefik.http.routers.app-login.middlewares=security-headers@docker,login-ratelimit@docker"
      - "traefik.http.routers.app-login.priority=10"

      # ── Service ───────────────────────────────────────────────────────────────
      - "traefik.http.services.app.loadbalancer.server.port=8080"

      # ── Global rate limit: 30 req/s, burst 60, per source IP ─────────────────
      - "traefik.http.middlewares.global-ratelimit.ratelimit.average=30"
      - "traefik.http.middlewares.global-ratelimit.ratelimit.period=1s"
      - "traefik.http.middlewares.global-ratelimit.ratelimit.burst=60"
      - "traefik.http.middlewares.global-ratelimit.ratelimit.sourcecriterion.ipstrategy.depth=1"

      # ── Login rate limit: 5 req/min, burst 3, per source IP ──────────────────
      - "traefik.http.middlewares.login-ratelimit.ratelimit.average=5"
      - "traefik.http.middlewares.login-ratelimit.ratelimit.period=60s"
      - "traefik.http.middlewares.login-ratelimit.ratelimit.burst=3"
      - "traefik.http.middlewares.login-ratelimit.ratelimit.sourcecriterion.ipstrategy.depth=1"

      # ── Security headers ──────────────────────────────────────────────────────
      - "traefik.http.middlewares.security-headers.headers.stsSeconds=63072000"
      - "traefik.http.middlewares.security-headers.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.security-headers.headers.stsPreload=true"
      - "traefik.http.middlewares.security-headers.headers.forceSTSHeader=true"
      - "traefik.http.middlewares.security-headers.headers.frameDeny=true"
      - "traefik.http.middlewares.security-headers.headers.contentTypeNosniff=true"
      - "traefik.http.middlewares.security-headers.headers.customResponseHeaders.X-XSS-Protection=1; mode=block"
      - "traefik.http.middlewares.security-headers.headers.referrerPolicy=strict-origin-when-cross-origin"
      - "traefik.http.middlewares.security-headers.headers.contentSecurityPolicy=default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net fonts.googleapis.com; font-src 'self' fonts.gstatic.com cdn.jsdelivr.net; img-src 'self' data: https:;"
      - "traefik.http.middlewares.security-headers.headers.customResponseHeaders.Server="

  # ── Traefik reverse proxy + ACME ──────────────────────────────────────────────
  traefik:
    image: traefik:v3.6
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefik/traefik.yml:/traefik.yml:ro
      - /opt/musings/data/traefik/acme.json:/letsencrypt/acme.json
      - /var/log/traefik:/var/log/traefik
    networks:
      - proxy

  watchtower:
    image: nickfedor/watchtower:1.14.3
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      WATCHTOWER_SCOPE:                  musings-prod
      WATCHTOWER_POLL_INTERVAL:          300      # check every 5 minutes
      WATCHTOWER_CLEANUP:                "true"   # remove old images after update
      WATCHTOWER_INCLUDE_STOPPED:        "false"
      WATCHTOWER_NOTIFICATION_SLACK_HOOK_URL: ${SLACK_WEBHOOK_URL}
      WATCHTOWER_NOTIFICATION_SLACK_IDENTIFIER: watchtower-musings
    command: --scope musings-prod

networks:
  internal:
    name: internal
    # Private network: app ↔ db only
    internal: true
    ipam:
      config:
        - subnet: 192.168.100.0/24
          gateway: 192.168.100.1
  proxy:
    name: proxy
    ipam:
      config:
        - subnet: 192.168.10.0/24
          gateway: 192.168.10.1
    # Public-facing network: traefik ↔ app
