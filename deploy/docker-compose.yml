services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB}
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - /opt/musings/data/postgres:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
  app:
    image: fonalex45/blog:latest
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    labels:
      - "com.centurylinklabs.watchtower.scope=musings-prod"
    environment:
      APP_ENV:       production
      DATABASE_URL:  postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      SECRET_KEY:    ${SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    networks:
      - internal
      - proxy
  # ── Nginx reverse proxy ────────────────────────────────────────────────────
  nginx:
    image: nginx:1.29-alpine-slim
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/blog.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/musings/data/certbot-certs:/etc/letsencrypt:ro
      - /opt/musings/data/certbot-www:/var/www/certbot:ro
      # Bind log directory to host so fail2ban can read it
      - /var/log/nginx:/var/log/nginx
    networks:
      - proxy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
  certbot:
    image: certbot/certbot:latest
    restart: unless-stopped
    volumes:
      - /opt/musings/data/certbot-certs:/etc/letsencrypt
      - /opt/musings/data/certbot-www:/var/www/certbot
    # Renew every 12 hours; certbot skips if cert has >30 days remaining
    entrypoint: >
      /bin/sh -c "trap exit TERM;
      while :; do
        certbot renew --webroot -w /var/www/certbot --quiet;
        sleep 12h & wait $${!};
      done"
  watchtower:
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # Only watch the app container, not infra services
      WATCHTOWER_SCOPE:                  musings-prod
      WATCHTOWER_POLL_INTERVAL:          300      # check every 5 minutes
      WATCHTOWER_CLEANUP:                "true"   # remove old images after update
      WATCHTOWER_INCLUDE_STOPPED:        "false"
      WATCHTOWER_NOTIFICATION_SLACK_HOOK_URL: ${SLACK_WEBHOOK_URL}
      WATCHTOWER_NOTIFICATION_SLACK_IDENTIFIER: watchtower-musings
    command: --scope musings-prod

networks:
  internal:
    # Private network: app ↔ db only, not reachable from nginx
    internal: true
  proxy:
    # Public-facing network: nginx ↔ app
