# ── Rate limiting zones ────────────────────────────────────────────────────
# Defined here rather than http{} block since this is inside conf.d/
limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=global:10m rate=30r/s;

# ── HTTP — redirect to HTTPS + ACME challenge ─────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name DOMAIN_PLACEHOLDER;

    # Let's Encrypt webroot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS ──────────────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name DOMAIN_PLACEHOLDER;

    # ── TLS certificates (managed by certbot) ───────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN_PLACEHOLDER/privkey.pem;

    # ── TLS hardening ────────────────────────────────────────────────────────
    ssl_session_timeout    1d;
    ssl_session_cache      shared:MozSSL:10m;
    ssl_session_tickets    off;
    ssl_protocols          TLSv1.2 TLSv1.3;
    ssl_ciphers            ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # HSTS (2 years, include subdomains)
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                          always;
    add_header X-Content-Type-Options    "nosniff"                             always;
    add_header X-XSS-Protection          "1; mode=block"                       always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"     always;
    add_header Content-Security-Policy   "default-src 'self'; script-src 'self' 'unsafe-inline' cdn.jsdelivr.net; style-src 'self' 'unsafe-inline' cdn.jsdelivr.net fonts.googleapis.com; font-src 'self' fonts.gstatic.com cdn.jsdelivr.net; img-src 'self' data: https:;" always;
    server_tokens off;

    # ── Logging (fail2ban reads these) ──────────────────────────────────────
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log warn;

    # ── Global rate limit ────────────────────────────────────────────────────
    limit_req zone=global burst=60 nodelay;

    # ── Login endpoint — tighter rate limit (fail2ban also watches) ──────────
    location /login {
        limit_req zone=login burst=3 nodelay;
        limit_req_status 429;

        proxy_pass         http://app:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Health check endpoint (used by Docker healthcheck) ──────────────────
    location /health {
        access_log off;
        proxy_pass http://app:8080/;
        proxy_set_header Host $host;
    }

    # ── Everything else ──────────────────────────────────────────────────────
    location / {
        proxy_pass         http://app:8080;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;

        # Buffer settings
        proxy_buffer_size        4k;
        proxy_buffers            8 4k;
        proxy_busy_buffers_size  8k;
    }

    # ── Block common exploit paths ───────────────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
    }

    location ~* \.(env|git|sql|bak|conf|log)$ {
        deny all;
        access_log off;
    }
}
