#cloud-config
hostname: musings-blog
timezone: UTC
package_update: true
package_upgrade: true

packages:
  - apt-transport-https
  - ca-certificates
  - curl
  - gnupg
  - lsb-release
  - tmux
  - vim
  - fail2ban
  - ufw
  - git
  - logrotate

# ── Users ─────────────────────────────────────────────────────────────────────

users:
  - name: deploy
    groups: [sudo, docker]
    shell: /bin/bash
    sudo: "ALL=(ALL) NOPASSWD:ALL"
    lock_passwd: true

# ── Write configuration files ─────────────────────────────────────────────────

write_files:

  # ── fail2ban: override defaults ────────────────────────────────────────────
  - path: /etc/fail2ban/jail.local
    content: |
      [DEFAULT]
      bantime  = 3600
      findtime = 600
      maxretry = 5
      backend  = systemd
      banaction = iptables-multiport

      # ── SSH ──────────────────────────────────────────────────────────────
      [sshd]
      enabled  = true
      port     = ssh
      logpath  = /var/log/auth.log
      maxretry = 6
      bantime  = 86400

      # ── Traefik: repeated 4xx (bot scanning, bad requests) ───────────────
      [nginx-botsearch]
      enabled  = true
      port     = http,https
      logpath  = /var/log/traefik/access.log
      maxretry = 10
      findtime = 300
      bantime  = 3600

      # ── Traefik: rate-limit hits (429 responses) ──────────────────────────
      [nginx-limit-req]
      enabled  = true
      port     = http,https
      logpath  = /var/log/traefik/access.log
      maxretry = 10
      findtime = 120
      bantime  = 7200

      # ── Blog login brute-force ────────────────────────────────────────────
      [musings-login]
      enabled  = true
      port     = http,https
      filter   = musings-login
      logpath  = /var/log/traefik/access.log
      maxretry = 10
      findtime = 300
      bantime  = 86400

  # ── fail2ban: custom filter for blog /login ───────────────────────────────
  - path: /etc/fail2ban/filter.d/musings-login.conf
    content: |
      [Definition]
      # Match any POST to /login regardless of response code.
      # fail2ban bans the IP after maxretry hits within findtime.
      failregex = ^<HOST> - \S+ \[.*\] "POST /login(\s|\?) HTTP/\d\.\d" \d{3}
      ignoreregex =

  # ── fail2ban: nginx rate-limit filter ─────────────────────────────────────
  - path: /etc/fail2ban/filter.d/nginx-limit-req.conf
    content: |
      [Definition]
      # Catch nginx 429 (Too Many Requests) responses from limit_req
      failregex = ^<HOST> - \S+ \[.*\] "\S+ \S+ HTTP/\d\.\d" 429
      ignoreregex =

  # ── fail2ban: nginx bot-search filter ─────────────────────────────────────
  - path: /etc/fail2ban/filter.d/nginx-botsearch.conf
    content: |
      [Definition]
      # Ban IPs that generate repeated 404/400/403 responses (scanners/bots)
      failregex = ^<HOST> - \S+ \[.*\] "\S+ \S+ HTTP/\d\.\d" (400|403|404)
      ignoreregex = ^<HOST> - \S+ \[.*\] "GET /favicon

  # ── logrotate: traefik container logs ─────────────────────────────────────
  - path: /etc/logrotate.d/traefik-docker
    content: |
      /var/log/traefik/*.log {
          daily
          missingok
          rotate 14
          compress
          delaycompress
          notifempty
          copytruncate
      }

  # ── SSH hardening ──────────────────────────────────────────────────────────
  - path: /etc/ssh/sshd_config.d/99-harden.conf
    content: |
      PasswordAuthentication no
      PermitRootLogin prohibit-password
      X11Forwarding no
      MaxAuthTries 6
      LoginGraceTime 30

# ── Run commands ──────────────────────────────────────────────────────────────

runcmd:
  # ── Install Docker Engine (official apt repo) ──────────────────────────────
  - curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
  - chmod a+r /etc/apt/keyrings/docker.asc
  - |
    echo "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
    https://download.docker.com/linux/ubuntu $(. /etc/os-release && echo $VERSION_CODENAME) stable" \
    > /etc/apt/sources.list.d/docker.list
  - apt-get update -qq
  - apt-get install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin

  # ── Ensure Docker starts on boot ───────────────────────────────────────────
  - systemctl enable docker
  - systemctl start docker

  # ── Add deploy user to docker group ───────────────────────────────────────
  - usermod -aG docker deploy

  # ── Create deployment directory structure ─────────────────────────────────
  - mkdir -p /opt/musings/scripts
  - mkdir -p /var/log/traefik
  - chown -R deploy:deploy /opt/musings

  # ── Configure UFW (defense-in-depth, Hetzner firewall is primary) ─────────
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow 22/tcp
  - ufw allow 80/tcp
  - ufw allow 443/tcp
  - ufw --force enable

  # ── Enable and start fail2ban ──────────────────────────────────────────────
  - systemctl enable fail2ban
  - systemctl restart fail2ban

  # ── Reload SSH to apply hardening ─────────────────────────────────────────
  - systemctl reload sshd
