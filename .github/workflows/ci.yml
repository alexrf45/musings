name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    name: Lint and Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: test_musings
          POSTGRES_USER: musings
          POSTGRES_PASSWORD: musings
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      APP_ENV: testing
      DATABASE_URL: postgresql://musings:musings@localhost:5432/test_musings
      SECRET_KEY: ci-secret-key
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: testpassword

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check blog/

      - name: Apply migrations
        run: flask db upgrade

      - name: Test
        run: pytest tests/ -v
