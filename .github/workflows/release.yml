name: Release (manual)

# Manual re-tag only — automatic semver pushes are handled by release-please.yml.
on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to build and push (e.g. v1.2.3)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  docker:
    name: Push Semver Image
    runs-on: ubuntu-latest
    env:
      TAG: ${{ inputs.tag }}
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Notify Slack — starting
        uses: act10ns/slack@v2
        with:
          status: starting
          channel: '#musings'
          message: Manual re-tag of musings ${{ env.TAG }}...

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: fonalex45/blog
          tags: |
            type=semver,pattern={{version}},value=${{ env.TAG }}
            type=semver,pattern={{major}}.{{minor}},value=${{ env.TAG }}
            type=semver,pattern={{major}},value=${{ env.TAG }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Notify Slack — result
        uses: act10ns/slack@v2
        with:
          status: ${{ job.status }}
          channel: '#musings'
          message: Manual re-tag ${{ env.TAG }} complete
        if: always()
